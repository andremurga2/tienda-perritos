version: '3.8'

services:
  # Servicio de Base de Datos MySQL
  db:
    build: ./db
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: tienda_perritos
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Servicio Backend Node.js
  backend:
    build: ./backend
    container_name: node-backend
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: admin123
      DB_NAME: tienda_perritos
      DB_PORT: 3306
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # Servicio Frontend Nginx
  frontend:
    build: ./frontend
    container_name: nginx-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

# Volumen persistente para la base de datos
volumes:
  db-data:
    driver: local

# Red interna para comunicación entre contenedores
networks:
  app-network:
    driver: bridge